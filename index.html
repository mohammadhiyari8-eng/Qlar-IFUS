const fmt=n=>'€'+Math.round(n).toLocaleString('en-US');
const fK=n=>n>=1e6?'€'+(n/1e6).toFixed(1)+'M':n>=1000?'€'+Math.round(n/1000).toLocaleString()+'K':'€'+Math.round(n);
const stCls=s=>({Ordered:'s-ord',Open:'s-opn','On hold':'s-hld',Closed:'s-cls','Awarded to Comp.':'s-lst',Rejected:'s-lst'}[s]||'s-cls');
const stLbl=s=>s==='Awarded to Comp.'?'Lost':s;
const CI={};function dc(id){if(CI[id]){CI[id].destroy();delete CI[id]}}
const YRS=[2023,2024,2025,2026],YLBL=['2023','2024','2025','2026*'];
const SVC=IFUS.filter(r=>r.category==='Service'),SPA=IFUS.filter(r=>r.category==='Spare Parts');
function sel(id){const e=document.getElementById(id);return e?e.value:'all'}
function fv(v,f){return f==='all'||String(v)===String(f)}
function winRate(arr){const t=arr.reduce((s,r)=>s+r.value,0);const o=arr.filter(r=>r.status==='Ordered').reduce((s,r)=>s+r.value,0);return t>0?Math.round(o/t*100):0}
function custGrowth(arr){const m={};arr.forEach(r=>{const y=r.year;if(!m[y])m[y]=new Set();m[y].add(r.customer||r.endUser)});return YRS.map(y=>m[y]?m[y].size:0)}

// Aggregate by a key field, returns sorted array [{name,value,count}]
function aggBy(arr,key){
  const m={};
  arr.forEach(r=>{const k=(r[key]||'Unknown').toString().trim();if(!m[k])m[k]={value:0,count:0};m[k].value+=r.value;m[k].count++});
  return Object.entries(m).map(([name,d])=>({name,value:d.value,count:d.count})).sort((a,b)=>b.value-a.value);
}

// ABC: takes sorted array from aggBy, adds grade
function addABC(sorted){
  const total=sorted.reduce((s,r)=>s+r.value,0);
  let cum=0;
  return sorted.map(r=>{cum+=r.value;const pct=total>0?cum/total*100:0;return{...r,pct:total>0?r.value/total*100:0,grade:pct<=80?'A':pct<=95?'B':'C'}});
}

// Horizontal bar chart helper — FIXED to properly show bars with values
function hBar(canvasId,labels,values,colors,title){
  dc(canvasId);
  const total=values.reduce((a,b)=>a+b,0);
  CI[canvasId]=new Chart(document.getElementById(canvasId),{
    type:'bar',
    data:{labels:labels,datasets:[{label:title||'Value (EUR)',data:values,backgroundColor:colors,borderRadius:3,barThickness:14}]},
    options:{
      responsive:true,maintainAspectRatio:false,indexAxis:'y',
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>{const p=total>0?(ctx.parsed.x/total*100).toFixed(1):'0';return fmt(ctx.parsed.x)+' ('+p+'%)'}}}},
      scales:{
        x:{ticks:{color:'#64748B',font:{size:9},callback:v=>v>=1e6?(v/1e6).toFixed(1)+'M':v>=1000?Math.round(v/1000)+'K':v},grid:{color:'rgba(51,65,85,.3)'},beginAtZero:true},
        y:{ticks:{color:'#94A3B8',font:{size:10},callback:function(v){const val=this.chart.data.datasets[0].data[v];const p=total>0?(val/total*100).toFixed(0):'0';return this.getLabelForValue(v)+' ('+p+'%)'}},grid:{display:false}}
      }
    }
  });
}

// Stacked bar chart helper
function stackBar(canvasId,labels,datasets){
  dc(canvasId);
  CI[canvasId]=new Chart(document.getElementById(canvasId),{
    type:'bar',data:{labels,datasets},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#94A3B8',font:{size:10}}},tooltip:{callbacks:{label:ctx=>{
        const dsArr=ctx.chart.data.datasets;const idx=ctx.dataIndex;
        const colTotal=dsArr.reduce((s,ds)=>s+(ds.data[idx]||0),0);
        const p=colTotal>0?(ctx.parsed.y/colTotal*100).toFixed(1):'0';
        return ctx.dataset.label+': '+fmt(ctx.parsed.y)+' ('+p+'%)'
      }}}},
      scales:{x:{stacked:true,ticks:{color:'#64748B',font:{size:9}},grid:{color:'rgba(51,65,85,.3)'}},y:{stacked:true,ticks:{color:'#64748B',font:{size:9},callback:v=>v>=1e6?(v/1e6).toFixed(1)+'M':v>=1000?Math.round(v/1000)+'K':v},grid:{color:'rgba(51,65,85,.3)'}}}
    }
  });
}

function updMain(){
  const fy=sel('mfY'),fi=sel('mfI');
  const fp=PROJ.filter(r=>fv(r.year,fy)&&fv(r.industry,fi));
  const fs=SVC.filter(r=>fv(r.year,fy)&&fv(r.industry,fi));
  const fsp=SPA.filter(r=>fv(r.year,fy)&&fv(r.industry,fi));
  const all=[...fp,...fs,...fsp];
  const tOff=all.reduce((s,r)=>s+r.value,0);
  const tWon=all.filter(r=>r.status==='Ordered').reduce((s,r)=>s+r.value,0);
  const tPipe=all.filter(r=>['Open','On hold'].includes(r.status)).reduce((s,r)=>s+r.value,0);
  document.getElementById('mKpi').innerHTML=kpiHTML([
    {lb:'Total Offered',vl:fK(tOff),dt:all.length+' entries'},
    {lb:'Total Won',vl:fK(tWon),dt:all.filter(r=>r.status==='Ordered').length+' orders',color:'gn'},
    {lb:'Pipeline',vl:fK(tPipe),dt:'Open + On Hold',color:'tl'},
    {lb:'Win Rate',vl:winRate(all)+'%',dt:'ordered / offered',color:'gd'},
    {lb:'Projects',vl:String(fp.length),dt:fK(fp.reduce((s,r)=>s+r.value,0))},
    {lb:'Service',vl:String(fs.length),dt:fK(fs.reduce((s,r)=>s+r.value,0))},
    {lb:'Spare Parts',vl:String(fsp.length),dt:fK(fsp.reduce((s,r)=>s+r.value,0))},

}

    <div class="filters">
      <div class="fg"><label>Year</label><select id="pfY"><option value="all">All</option>${YRS.map(y=>`<option value="${y}">${y}</option>`).join('')}</select></div>
      <div class="fg"><label>Industry</label><select id="pfI"><option value="all">All</option><option value="Cement">Cement</option><option value="Steel">Steel</option><option value="C&P">C&P</option><option value="Mining">Mining</option></select></div>

      <button class="btn-r" onclick="['pfY','pfI','pfS','pfM','pfC'].forEach(x=>document.getElementById(x).value='all');updProj()">Reset</button></div>
    <div id="pKpi" class="kpi-row"></div>
    <div class="charts">
      <div class="cc"><h3><span class="dot" style="background:var(--tl)"></span>By Industry (Value)</h3><div class="cw"><canvas id="pC1"></canvas></div></div>
      <div class="cc"><h3><span class="dot" style="background:var(--gn)"></span>Status Distribution (Value)</h3><div class="cw"><canvas id="pC2"></canvas></div></div>
      <div class="cc"><h3><span class="dot" style="background:var(--gd)"></span>ABC Customers — Ordered</h3><div class="cw"><canvas id="pC3"></canvas></div></div>

    ['pfY','pfI','pfS','pfM','pfC'].forEach(x=>document.getElementById(x).addEventListener('change',updProj));
    rendered.projects=true;
  }
  updProj();
};
function updProj(){
  const fy=sel('pfY'),fi=sel('pfI'),fs=sel('pfS'),fm=sel('pfM'),fc=sel('pfC');
  const fp=PROJ.filter(r=>fv(r.year,fy)&&fv(r.industry,fi)&&fv(r.status,fs)&&fv(r.mode,fm)&&fv(r.country,fc));
  const tOff=fp.reduce((s,r)=>s+r.value,0);
  const ordArr=fp.filter(r=>r.status==='Ordered');
  const tWon=ordArr.reduce((s,r)=>s+r.value,0);
  const pipe=fp.filter(r=>['Open','On hold'].includes(r.status));
  const lost=fp.filter(r=>r.status==='Awarded to Comp.');
  document.getElementById('pKpi').innerHTML=kpiHTML([
    {lb:'Total Offered',vl:fK(tOff),dt:fp.length+' projects'},
    {lb:'Ordered',vl:fK(tWon),dt:ordArr.length+' won',color:'gn'},
    {lb:'Pipeline',vl:fK(pipe.reduce((s,r)=>s+r.value,0)),dt:pipe.length+' active',color:'tl'},
    {lb:'Win Rate',vl:winRate(fp)+'%',dt:'ordered/offered',color:'gd'},
    {lb:'Lost Value',vl:fK(lost.reduce((s,r)=>s+r.value,0)),dt:lost.length+' lost',color:'rd'},
    {lb:'Avg Size',vl:fp.length?fK(tOff/fp.length):'—',dt:'per project'},
  ]);
  // Industry doughnut
  const indA=aggBy(fp,'industry');
  doughnut('pC1',indA.map(r=>r.name),indA.map(r=>r.value),['#0F2B5B','#0891B2','#F59E0B','#10B981','#8B5CF6']);
  // Status doughnut
  const stA=aggBy(fp,'status');
  const stColors={'Ordered':'#10B981','Open':'#06B6D4','On hold':'#F97316','Closed':'#64748B','Awarded to Comp.':'#EF4444','Rejected':'#EF4444'};
  doughnut('pC2',stA.map(r=>stLbl(r.name)),stA.map(r=>r.value),stA.map(r=>stColors[r.name]||'#64748B'));
  // ABC ordered — using endUser as key
  const ordByEU=aggBy(ordArr,'endUser');
  const abcOrd=addABC(ordByEU);
  if(abcOrd.length>0){
    hBar('pC3',abcOrd.map(r=>r.name.substring(0,25)),abcOrd.map(r=>r.value),abcOrd.map(r=>r.grade==='A'?'#10B981':r.grade==='B'?'#F59E0B':'#64748B'),'Ordered Value');
  } else { dc('pC3'); }
  // Pipeline potential — using endUser as key
  const pipeByEU=aggBy(pipe,'endUser');
  const topPipe=pipeByEU.slice(0,10);
  if(topPipe.length>0){
    hBar('pC4',topPipe.map(r=>r.name.substring(0,25)),topPipe.map(r=>r.value),topPipe.map(()=>'#06B6D4'),'Pipeline Value');
  } else { dc('pC4'); }
  // Table
  document.getElementById('pTtl').textContent='Projects ('+fp.length+')';
  document.getElementById('pTb').innerHTML=fp.sort((a,b)=>b.value-a.value).map(r=>`<tr><td style="color:var(--tx);font-weight:500">${r.endUser}</td><td>${r.industry}</td><td>${r.country}</td><td class="ar mono">${fmt(r.value)}</td><td><span class="st ${stCls(r.status)}">${stLbl(r.status)}</span></td><td>${r.mode}</td><td>${r.year||'—'}</td><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis">${r.desc}</td><td style="white-space:normal;word-wrap:break-word;font-size:9px;color:var(--sb);min-width:280px;max-width:400px;line-height:1.4">${r.notes||'—'}</td></tr>`).join('');
}

function updSvc(){
  const fy=sel('sfY'),fi=sel('sfI'),fs=sel('sfS'),fsr=sel('sfSr');
  const fd=SVC.filter(r=>fv(r.year,fy)&&fv(r.industry,fi)&&fv(r.status,fs)&&fv(r.source,fsr));
  const tOff=fd.reduce((s,r)=>s+r.value,0);
  const ord=fd.filter(r=>r.status==='Ordered');
  const tWon=ord.reduce((s,r)=>s+r.value,0);
  const pipe=fd.filter(r=>['Open','On hold'].includes(r.status));
  document.getElementById('sKpi').innerHTML=kpiHTML([
    {lb:'Total Value',vl:fK(tOff),dt:fd.length+' entries'},
    {lb:'Ordered',vl:fK(tWon),dt:ord.length+' orders',color:'gn'},
    {lb:'Win Rate',vl:winRate(fd)+'%',dt:'ordered/offered',color:'gd'},
    {lb:'Pipeline',vl:fK(pipe.reduce((s,r)=>s+r.value,0)),dt:pipe.length+' open',color:'tl'},
    {lb:'Local',vl:String(fd.filter(r=>r.source==='Local').length),dt:fK(fd.filter(r=>r.source==='Local').reduce((s,r)=>s+r.value,0))},
    {lb:'Germany',vl:String(fd.filter(r=>r.source==='Germany').length),dt:fK(fd.filter(r=>r.source==='Germany').reduce((s,r)=>s+r.value,0))},
  ]);
  const offY=YRS.map(y=>fd.filter(r=>r.year===y).reduce((s,r)=>s+r.value,0));
  const wonY=YRS.map(y=>fd.filter(r=>r.year===y&&r.status==='Ordered').reduce((s,r)=>s+r.value,0));
  grouped('sC1',YLBL,[{label:'Offered',data:offY,backgroundColor:'rgba(8,145,178,.3)',borderRadius:3},{label:'Ordered',data:wonY,backgroundColor:'#10B981',borderRadius:3}]);
  const srcA=aggBy(fd,'source');
  doughnut('sC2',srcA.map(r=>r.name),srcA.map(r=>r.value),['#0F2B5B','#F59E0B']);
  const ordByC=aggBy(ord,'customer');
  const abcOrd=addABC(ordByC);
  if(abcOrd.length>0){
    hBar('sC3',abcOrd.slice(0,10).map(r=>r.name.substring(0,20)),abcOrd.slice(0,10).map(r=>r.value),abcOrd.slice(0,10).map(r=>r.grade==='A'?'#10B981':r.grade==='B'?'#F59E0B':'#64748B'),'Ordered Value');
  } else { dc('sC3'); }
  const pipeByC=aggBy(pipe,'customer');
  if(pipeByC.length>0){
    hBar('sC4',pipeByC.slice(0,8).map(r=>r.name.substring(0,20)),pipeByC.slice(0,8).map(r=>r.value),pipeByC.slice(0,8).map(()=>'#06B6D4'),'Pipeline Value');
  } else { dc('sC4'); }
  document.getElementById('sTtl').textContent='Service ('+fd.length+')';
  document.getElementById('sTb').innerHTML=fd.sort((a,b)=>b.value-a.value).map(r=>`<tr><td style="color:var(--tx);font-weight:500">${r.customer}</td><td>${r.industry}</td><td>${r.country}</td><td class="ar mono">${fmt(r.value)}</td><td><span class="st ${stCls(r.status)}">${stLbl(r.status)}</span></td><td>${r.source}</td><td>${r.year}</td></tr>`).join('');
}

function updSpa(){
  const fy=sel('spfY'),fi=sel('spfI'),fs=sel('spfS'),fm=sel('spfM');
  const fd=SPA.filter(r=>fv(r.year,fy)&&fv(r.industry,fi)&&fv(r.status,fs)&&fv(r.mode,fm));
  const tOff=fd.reduce((s,r)=>s+r.value,0);
  const ord=fd.filter(r=>r.status==='Ordered');
  const tWon=ord.reduce((s,r)=>s+r.value,0);
  const pipe=fd.filter(r=>['Open','On hold'].includes(r.status));
  document.getElementById('spKpi').innerHTML=kpiHTML([
    {lb:'Total Value',vl:fK(tOff),dt:fd.length+' entries'},
    {lb:'Ordered',vl:fK(tWon),dt:ord.length+' orders',color:'gn'},
    {lb:'Win Rate',vl:winRate(fd)+'%',dt:'ordered/offered',color:'gd'},
    {lb:'Pipeline',vl:fK(pipe.reduce((s,r)=>s+r.value,0)),dt:pipe.length+' open',color:'tl'},
    {lb:'Avg Order',vl:ord.length?fK(tWon/ord.length):'—',dt:'per order'},
    {lb:'Customers',vl:String(new Set(fd.map(r=>r.customer)).size),dt:'unique'},

  const offY=YRS.map(y=>fd.filter(r=>r.year===y).reduce((s,r)=>s+r.value,0));

  doughnut('spC2',modeA.map(r=>r.name),modeA.map(r=>r.value),['#0891B2','#F59E0B','#8B5CF6']);
  // ABC ordered
  const ordByC=aggBy(ord,'customer');
  const abcOrd=addABC(ordByC);
  if(abcOrd.length>0){
    hBar('spC3',abcOrd.slice(0,12).map(r=>r.name.substring(0,18)),abcOrd.slice(0,12).map(r=>r.value),abcOrd.slice(0,12).map(r=>r.grade==='A'?'#10B981':r.grade==='B'?'#F59E0B':'#64748B'),'Ordered Value');
